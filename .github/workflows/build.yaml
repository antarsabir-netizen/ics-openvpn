# The name of our workflow
name: Build
permissions:
  contents: read
on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
          target: [UiOvpn23] # قللنا الأهداف لسرعة البناء وضمان النجاح
    name: "Debug ${{ matrix.target }}"
    runs-on: ubuntu-latest
    steps:
      - name: Use debug signing
        run: mkdir -p ~/.gradle && echo -e "icsopenvpnDebugSign=true\norg.gradle.jvmargs=-Xmx2048M" > ~/.gradle/gradle.properties
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build the app
        # 📍 التغيير الجوهري: تحويل من Release إلى Debug
        run: ./gradlew assemble${{ matrix.target }}Debug
      
      - name: Archive apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntarSabr-VPN-Debug
          # 📍 المسار الصحيح لملفات الـ Debug
          path: app/build/outputs/apk/**/debug/*.apk
